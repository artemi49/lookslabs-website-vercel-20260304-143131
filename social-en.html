<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./favicon.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="./favicon.png" />
    <title>Social Media – LooksLab</title>
    <meta
      name="description"
      content="Follow LooksLab on Instagram, TikTok, YouTube, and Snapchat."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8R2i7VJQnN3f0Yf4YjHfM4fYV7jL0wA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .social-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 56px 20px;
        position: relative;
        overflow: hidden;
      }
      .social-page::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 860px;
        height: 620px;
        border-radius: 50%;
        background: radial-gradient(
          ellipse at center,
          rgba(147, 197, 253, 0.24) 0%,
          rgba(147, 197, 253, 0.08) 45%,
          rgba(147, 197, 253, 0.02) 70%,
          transparent 100%
        );
        pointer-events: none;
        z-index: 0;
      }
      .social-back {
        position: fixed;
        top: 24px;
        left: 24px;
        text-decoration: none;
        color: var(--muted);
        font-weight: 500;
        font-size: 0.95rem;
        z-index: 10;
      }
      .social-back:hover { color: var(--text); }
      .social-lang {
        position: fixed;
        top: 24px;
        right: 24px;
        text-decoration: none;
        color: var(--muted);
        font-weight: 500;
        font-size: 0.9rem;
        z-index: 10;
      }
      .social-lang:hover { color: var(--text); }
      .social-card {
        position: relative;
        z-index: 1;
        width: min(560px, 100%);
        border: 1px solid var(--line);
        border-radius: 22px;
        background: #fff;
        padding: 34px 24px 24px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
      }
      .social-card h1 {
        margin: 0 0 10px;
        font-family: var(--font-heading);
        font-size: clamp(2.1rem, 5vw, 3rem);
        font-weight: 400;
        text-align: center;
      }
      .social-card p {
        margin: 0 0 24px;
        text-align: center;
        color: var(--muted);
      }
      .social-list {
        display: grid;
        gap: 12px;
      }
      .social-link {
        display: flex;
        align-items: center;
        gap: 12px;
        text-decoration: none;
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px 16px;
        font-weight: 600;
        transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      }
      .social-link i {
        width: 20px;
        text-align: center;
        font-size: 1.05rem;
      }
      .social-link span:last-child {
        margin-left: auto;
        color: var(--muted);
        font-size: 0.85rem;
      }
      .social-link:hover {
        transform: translateY(-1px);
        border-color: #cfd3da;
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.07);
      }
      @media (max-width: 600px) {
        .social-back { left: 16px; top: 18px; }
        .social-lang { right: 16px; top: 18px; }
        .social-card { padding: 28px 16px 16px; }
        .social-link { padding: 13px 14px; }
      }
    </style>
  </head>
  <body>
    <div class="social-page">
      <a class="social-back" href="./index-en.html">← Back</a>
      <a class="social-lang" href="./social.html">DE</a>

      <div class="social-card">
        <h1>LooksLab</h1>
        <p>Follow us on our social channels.</p>
        <div class="social-list">
          <a class="social-link" href="https://www.instagram.com/bramal.lookslab" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-instagram" aria-hidden="true"></i>
            <span>Instagram</span>
            <span>@bramal.lookslab</span>
          </a>
          <a class="social-link" href="https://www.tiktok.com/@bramal.lookslab" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-tiktok" aria-hidden="true"></i>
            <span>TikTok</span>
            <span>@bramal.lookslab</span>
          </a>
          <a class="social-link" href="https://www.youtube.com/@bramal.lookslab" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-youtube" aria-hidden="true"></i>
            <span>YouTube</span>
            <span>@bramal.lookslab</span>
          </a>
          <a class="social-link" href="https://www.snapchat.com/@lookslab.de" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-snapchat" aria-hidden="true"></i>
            <span>Snapchat</span>
            <span>@lookslab.de</span>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
